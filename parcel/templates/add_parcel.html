<!DOCTYPE html>
<html>
<head>
    <title>Add Parcel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">
    <div class="card p-4 shadow">

        <h3 class="text-center mb-4">📦 Add Parcel</h3>

        <form method="POST">
            {% csrf_token %}

            <input type="text" name="sender_name" class="form-control mb-3" placeholder="Sender Name" required>

            <input type="text" name="receiver_name" class="form-control mb-3" placeholder="Receiver Name" required>

            <input type="text" name="pickup_location" class="form-control mb-3" placeholder="Pickup Location" required>

            <input type="text" name="delivery_location" class="form-control mb-3" placeholder="Delivery Location" required>

            <input type="number" step="0.01" name="weight" class="form-control mb-3" placeholder="Weight (kg)" required>

            <!-- 📱 Mobile -->
            <input type="text" name="phone" class="form-control mb-3" placeholder="Mobile Number" required>

            <button class="btn btn-primary w-100">Save Parcel</button>

        </form>

    </div>
</div>

</body>
</html>
