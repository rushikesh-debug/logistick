<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Chart JS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body style="background:#f5f5f5;">

<div class="container mt-4">

    <h2 class="mb-4 text-center">🚚 Fast Track Logistics Dashboard</h2>

    <!-- 🔢 Cards -->
    <div class="row text-center">

        <div class="col-md-3">
            <div class="card shadow p-3 mb-3 bg-white rounded">
                <h5>Total</h5>
                <h3>{{ total }}</h3>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow p-3 mb-3 bg-success text-white rounded">
                <h5>Delivered</h5>
                <h3>{{ delivered }}</h3>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow p-3 mb-3 bg-warning text-dark rounded">
                <h5>Pending</h5>
                <h3>{{ pending }}</h3>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow p-3 mb-3 bg-primary text-white rounded">
                <h5>Transit</h5>
                <h3>{{ transit }}</h3>
            </div>
        </div>

    </div>

    <!-- 📊 Charts -->
    <div class="row mt-4">

        <div class="col-md-6">
            <div class="card p-3 shadow">
                <h5 class="text-center">Bar Chart</h5>
                <canvas id="barChart"></canvas>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card p-3 shadow">
                <h5 class="text-center">Pie Chart</h5>
                <canvas id="pieChart"></canvas>
            </div>
        </div>

    </div>

</div>

<script>
    const labels = ['Delivered', 'Pending', 'In Transit'];
    const values = [{{ delivered }}, {{ pending }}, {{ transit }}];

    // Bar Chart
    new Chart(document.getElementById('barChart'), {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Parcels',
                data: values,
                backgroundColor: ['green', 'orange', 'blue']
            }]
        }
    });

    // Pie Chart
    new Chart(document.getElementById('pieChart'), {
        type: 'pie',
        data: {
            labels: labels,
            datasets: [{
                data: values,
                backgroundColor: ['green', 'orange', 'blue']
            }]
        }
    });
</script>

</body>
</html>
